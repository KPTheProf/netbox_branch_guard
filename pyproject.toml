[build-system]
requires = ["setuptools>=68", "wheel", "setuptools-scm"]
build-backend = "setuptools.build_meta"


[project]
name = "netbox-branch-guard"
dynamic = ["version"]

description = "Branch enforcement middleware for NetBox"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [{ name = "KPTheProf" }]
license = { file = "LICENSE" }

requires-python = ">=3.8"

dependencies = [
    "django>=4.2,<5.2",
]

keywords = ["netbox", "django", "plugin", "branching", "middleware"]

classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Django",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
]


[project.urls]
Homepage = "https://github.com/KPTheProf/netbox-branch-guard"
Source = "https://github.com/KPTheProf/netbox-branch-guard"
Issues = "https://github.com/KPTheProf/netbox-branch-guard/issues"


[tool.setuptools_scm]
version_scheme = "post-release"
local_scheme = "no-local-version"


[tool.setuptools.packages.find]
include = ["netbox_branch_guard*"]


[tool.setuptools.package-data]
"netbox_branch_guard" = ["templates/**/*", "static/**/*"]


[tool.setuptools]
include-package-data = true


[tool.uv]
managed = true


[project.optional-dependencies]
dev = [
    "pytest",
    "black",
    "ruff",
]









[build-system]
requires = ["setuptools>=68", "wheel", "setuptools-scm"]
build-backend = "setuptools.build_meta"


[project]
name = "netbox-branch-guard"
dynamic = ["version"]

description = "Branch enforcement middleware for NetBox"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [{ name = "KPTheProf" }]
license = { file = "LICENSE" }

requires-python = ">=3.8"

dependencies = [
    "django>=4.2",
]

keywords = ["netbox", "django", "plugin", "branching", "middleware"]


[project.urls]
Homepage = "https://github.com/KPTheProf/netbox-branch-guard"
Source = "https://github.com/KPTheProf/netbox-branch-guard"
Issues = "https://github.com/KPTheProf/netbox-branch-guard/issues"


# ✅ This activates setuptools-scm
[tool.setuptools_scm]
version_scheme = "post-release"
local_scheme = "no-local-version"
write_to = "netbox_branch_guard/_version.py"


# ✅ Automatically find packages
[tool.setuptools.packages.find]
include = ["netbox_branch_guard*"]


# ✅ Include non-Python files (if needed)
[tool.setuptools.package-data]
"netbox_branch_guard" = ["templates/**/*", "static/**/*"]


# ✅ Optional: include files from MANIFEST.in if you add one later
[tool.setuptools]
include-package-data = true


# ✅ Optional uv config (helps with consistency, not required)
[tool.uv]
# Ensures reproducible builds (optional but nice)
managed = true


# ✅ Optional dependency groups (for development)
[project.optional-dependencies]
dev = [
    "pytest",
    "black",
    "ruff",
]

